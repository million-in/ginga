name: release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Prepare reports directory
        run: |
          mkdir -p .reports
          printf '{ "workflow": "release", "ok": false }\n' > .reports/bootstrap.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Zig
        run: bash scripts/ci/install-zig.sh 0.15.2

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Run quality gate
        run: bash scripts/ci/quality-gate.sh

      - name: Decide releasability
        run: bun scripts/ci/release-gate.mjs releasable

      - name: Upload release reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: release-reports
          path: .reports
          if-no-files-found: ignore

  build-cli-assets:
    needs: gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_suffix: linux-x86_64
            archive_format: tar.gz
          - runner: macos-13
            asset_suffix: macos-x86_64
            archive_format: tar.gz
          - runner: macos-14
            asset_suffix: macos-aarch64
            archive_format: tar.gz
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Zig
        run: bash scripts/ci/install-zig.sh 0.15.2

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Build release binary
        run: zig build -Doptimize=ReleaseSafe

      - name: Package CLI asset
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets/package
          cp zig-out/bin/ginga release-assets/package/ginga
          chmod 755 release-assets/package/ginga
          cp README.md LICENSE release-assets/package/
          archive="release-assets/ginga-${GITHUB_REF_NAME}-${{ matrix.asset_suffix }}.${{ matrix.archive_format }}"
          tar -czf "$archive" -C release-assets/package ginga README.md LICENSE
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$archive" > "$archive.sha256"
          else
            sha256sum "$archive" > "$archive.sha256"
          fi

      - name: Upload CLI asset
        uses: actions/upload-artifact@v6
        with:
          name: release-cli-${{ matrix.asset_suffix }}
          path: |
            release-assets/*.tar.gz
            release-assets/*.sha256
          if-no-files-found: error

  publish-release:
    needs:
      - gate
      - build-cli-assets
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download release reports
        uses: actions/download-artifact@v5
        with:
          name: release-reports
          path: .reports

      - name: Download CLI assets
        uses: actions/download-artifact@v5
        with:
          pattern: release-cli-*
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          title="ginga ${tag}"
          notes_file=".reports/release-notes.md"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$title" --notes-file "$notes_file"
          else
            gh release create "$tag" --title "$title" --notes-file "$notes_file" --verify-tag
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" release-assets/* --clobber
