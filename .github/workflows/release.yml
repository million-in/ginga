name: release

on:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare reports directory
        run: |
          mkdir -p .reports
          printf '{ "workflow": "release", "ok": false }\n' > .reports/bootstrap.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Zig
        run: bash scripts/ci/install-zig.sh 0.15.2

      - name: Install Bun dependencies
        run: bun install --frozen-lockfile

      - name: Run quality gate
        run: bash scripts/ci/quality-gate.sh

      - name: Decide releasability
        run: bun scripts/ci/release-gate.mjs releasable

      - name: Upload release reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-reports
          path: .reports
          if-no-files-found: ignore
